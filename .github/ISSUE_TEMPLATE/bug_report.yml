name: Bug Report
description: File a bug report
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below.

  - type: input
    id: contact
    attributes:
      label: Your name and email
      description: So we can follow up if we have questions.
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How do you trigger this bug?
      placeholder: |
        1. Open the app
        2. Navigate to '...'
        3. Click '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and app version (e.g. v1.2.0)
      placeholder: |
        OS: Windows 11 / macOS 14 / Ubuntu 24.04
        Python: 3.14.x
        App version: v1.0.0
    validations:
      required: false
