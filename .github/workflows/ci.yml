name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same ref so superseded pushes don't
# waste runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Check-only, not --fix/auto-format: CI should fail loudly on lint
      # violations rather than silently rewriting code. Local pre-commit
      # (.pre-commit-config.yaml) is the one that auto-fixes.
      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy --strict domain/ core/ controllers/

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Scoped to this repo's first-party packages (excludes tests/ itself
      # and main.py's entry point) so the report reflects meaningfully
      # testable source, not noise.
      #
      # PYSTRAY_BACKEND=dummy: this runner has no X server. On Linux,
      # pystray's default backend probing tries appindicator/gtk (missing,
      # raises ImportError, skipped) then falls back to _xorg, which opens
      # a real Xlib.display.Display() at import time -- not caught as
      # ImportError, so it crashes test collection the moment anything
      # imports views.tray (directly, or via main.py). The dummy backend
      # is pystray's own supported no-GUI mode for exactly this case.
      - name: Run pytest with coverage
        env:
          PYSTRAY_BACKEND: dummy
        run: >
          pytest tests/
          --cov=domain --cov=core --cov=controllers --cov=db
          --cov=models --cov=settings --cov=theme --cov=views
          --cov-report=term-missing
          --cov-fail-under=90
