name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same ref so superseded pushes don't
# waste runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Check-only, not --fix/auto-format: CI should fail loudly on lint
      # violations rather than silently rewriting code. Local pre-commit
      # (.pre-commit-config.yaml) is the one that auto-fixes.
      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      # Whole-project lint. The [tool.pylint] disable list (pyproject.toml) is
      # trimmed to only the deliberately-kept design-metric rules (issue #42);
      # everything else is enforced.
      - name: Run pylint
        run: >
          pylint domain/ core/ controllers/ models/ db/ views/ tests/
          theme/ help/ settings.py main.py version.py

      # Whole-project Markdown lint (two pip tools, no Node). PyMarkdown scans
      # structure + prose rules (config [tool.pymarkdown]); --respect-gitignore
      # skips the git-ignored dev docs (CLAUDE.md/AGENTS.md/.claude) so this
      # matches the pre-commit hook's tracked-files scope.
      - name: Run pymarkdown
        run: pymarkdown scan -r --respect-gitignore .

      # mdformat --check enforces canonical Markdown formatting (consistent
      # table pipe/column/alignment style, fences, lists) -- the table-style
      # gate PyMarkdown can't provide. Scans tracked files only.
      - name: Run mdformat --check
        run: git ls-files '*.md' | xargs mdformat --check

      # Whole-project YAML lint. Config: .yamllint.
      - name: Run yamllint
        run: yamllint .

      # Well-formedness gate for every TOML / JSON file (the check-toml /
      # check-json pre-commit hooks are the local equivalents). Uses stdlib
      # only -- no extra dependency. Scoped to tracked files via git ls-files
      # (like the mdformat gate above) so it honours .gitignore and never
      # descends into .venv/.claude -- and so a local run matches CI.
      - name: Check TOML + JSON parse
        run: |
          python - <<'PY'
          import json
          import subprocess
          import tomllib
          out = subprocess.run(
              ["git", "ls-files", "-z", "*.toml", "*.json"],
              capture_output=True, check=True,
          ).stdout
          for path in filter(None, out.decode().split("\0")):
              if path.endswith(".toml"):
                  with open(path, "rb") as fh:
                      tomllib.load(fh)
              else:
                  with open(path, encoding="utf-8") as fh:
                      json.load(fh)
          PY

  type-check:
    name: Type Check
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy --strict domain/ core/ controllers/ models/

      # Scope + mode configured in [tool.pyright] (pyproject.toml): whole
      # project, "standard" mode, with tests/ + views/ pre-existing noise
      # baselined per-path via executionEnvironments. Catches the Pylance/editor
      # type errors mypy's scope misses.
      - name: Run pyright
        run: pyright

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # PYSTRAY_BACKEND=dummy: this runner has no X server. On Linux,
      # pystray's default backend probing tries appindicator/gtk (missing,
      # raises ImportError, skipped) then falls back to _xorg, which opens
      # a real Xlib.display.Display() at import time -- not caught as
      # ImportError, so it crashes test collection the moment anything
      # imports views.tray (directly, or via main.py). The dummy backend
      # is pystray's own supported no-GUI mode for exactly this case.
      #
      # The 90% fail-under gate applies only to domain/core/models/controllers
      # (see CLAUDE.md's coverage target) -- views/settings/theme/db are
      # UI and I/O heavy and reported for visibility only, not gated.
      - name: Run pytest with coverage
        env:
          PYSTRAY_BACKEND: dummy
        run: >
          pytest tests/
          --cov=domain --cov=core --cov=controllers
          --cov=models --cov=db --cov=settings --cov=theme --cov=views
          --cov-report=term-missing

      - name: Enforce coverage gate on core layers
        run: >
          coverage report
          --include="domain/*,core/*,controllers/*,models/*"
          --fail-under=90
