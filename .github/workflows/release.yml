name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Default to read-only; the release job explicitly elevates to write.
permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: time-clock
            asset_name: time-clock-linux
          - os: windows-latest
            artifact_name: time-clock.exe
            asset_name: time-clock-windows.exe
          - os: macos-latest
            artifact_name: time-clock
            asset_name: time-clock-macos

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # tkinter is not bundled in the GitHub-hosted Ubuntu runner's Python.
      - name: Install system tkinter (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y python3-tk

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --windowed main.py --name time-clock

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    # Only this job needs write access to create the release and upload assets.
    permissions:
      contents: write

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          files: artifacts/*/*
          generate_release_notes: true
