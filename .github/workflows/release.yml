name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Default to read-only; the release job explicitly elevates to write.
permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: time-clock
            asset_name: time-clock-linux
          - os: windows-latest
            artifact_name: time-clock.exe
            asset_name: time-clock-windows.exe
          - os: macos-latest
            artifact_name: time-clock
            asset_name: time-clock-macos

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # tkinter is not bundled in the GitHub-hosted Ubuntu runner's Python.
      - name: Install system tkinter (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y python3-tk

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --windowed main.py --name time-clock

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    # Only this job needs write access to create the release and upload assets.
    permissions:
      contents: write

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: artifacts/*/*
          generate_release_notes: true
