repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        # Mirror the CI check: always scan the gated source trees, not just
        # changed files, so the gate is identical locally and in CI.
        args: [--strict, domain/, core/, controllers/, models/]
        pass_filenames: false

  # Markdown structure + prose lint. rev pinned to match pymarkdownlnt in
  # requirements-dev.txt; rules live in [tool.pymarkdown] (pyproject.toml).
  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.39
    hooks:
      - id: pymarkdown
        args: [scan]

  # Markdown formatting (canonical tables/fences/lists -- this is what enforces
  # consistent table style, which PyMarkdown can't). Auto-fixes in place like
  # ruff-format above; CI runs `mdformat --check`. mdformat-gfm adds GFM table
  # support. rev + additional_dependencies pinned to requirements-dev.txt.
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm==1.0.0

  # YAML lint. rev pinned to match yamllint in requirements-dev.txt; rules live
  # in .yamllint.
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
